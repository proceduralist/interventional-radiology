<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b24">
  <meta name="description" content="IR Casebook — an offline-ready interventional radiology procedural reference and study tool for residents.">
  <title>IR Casebook — Interventional Radiology Procedural Reference</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header id="topbar">
    <button id="menuBtn" class="icon-btn" aria-label="Toggle navigation" title="Menu">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>

    <a class="brand" href="#/" aria-label="IR Casebook home">
      <svg class="brand-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
        <rect x="1" y="1" width="30" height="30" rx="8" fill="var(--brand-navy)"/>
        <path d="M4 22 C 10 12, 22 10, 29 5 C 22 14, 12 18, 4 22 Z" fill="var(--accent)"/>
        <text x="16" y="25" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" font-family="system-ui, sans-serif">IR</text>
      </svg>
      <span class="brand-name">IR&nbsp;Casebook</span>
    </a>

    <div id="omni" role="search">
      <svg class="omni-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="omniInput" type="search" placeholder="Search procedures, anatomy, devices…  ( / )" autocomplete="off" spellcheck="false" aria-label="Search">
      <div id="omniResults" hidden></div>
    </div>

    <div class="topbar-actions">
      <label class="switch" title="Study / pimping mode — blurs high-yield answers for active recall (S)">
        <input type="checkbox" id="studyToggle" aria-label="Study mode">
        <span class="slider"></span>
        <span class="switch-label">Study</span>
      </label>

      <button id="themeBtn" class="icon-btn" aria-label="Toggle light/dark theme" title="Theme">
        <svg class="ic-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        <svg class="ic-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>

      <button id="calcBtn" class="icon-btn" aria-label="Clinical calculators" title="Clinical calculators (C)">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M8 6h8M8.5 11h.01M12 11h.01M15.5 11h.01M8.5 15h.01M12 15h.01M15.5 15h.01M8.5 19h.01M12 19h.01M15.5 19h.01"/></svg>
      </button>
    </div>
  </header>

  <div id="layout">
    <aside id="sidebar" aria-label="Scrub Sink navigation"><!-- built by app.js --></aside>
    <div id="scrim" hidden></div>
    <main id="main" tabindex="-1"><!-- routed views --></main>
  </div>

  <aside id="calcDrawer" aria-label="Clinical calculators" hidden><!-- built by app.js --></aside>
  <div id="calcScrim" hidden></div>

  <div id="toast" role="status" hidden></div>

  <!-- Hidden print-only container for the Scrub Sheet PDF export -->
  <section id="printRoot" aria-hidden="true"></section>

  <script src="js/config.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
